<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Stylish Calculator — perform addition, subtraction, multiplication and division with keyboard support."/>
  <title>Stylish Calculator</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body>

  <!-- Ambient Background -->
  <div class="bg-glow glow-1"></div>
  <div class="bg-glow glow-2"></div>
  <div class="bg-glow glow-3"></div>

  <div class="calc-wrapper">

    <!-- Display -->
    <div class="display" id="display">
      <div class="expression" id="expression"></div>
      <div class="result"     id="result">0</div>
    </div>

    <!-- Button Grid -->
    <div class="btn-grid">

      <!-- Row 1 -->
      <button class="btn btn-fn   span-2" id="btn-clear"   data-action="clear">AC</button>
      <button class="btn btn-fn"          id="btn-delete"  data-action="delete">⌫</button>
      <button class="btn btn-op"          id="btn-div"     data-action="op" data-value="÷">÷</button>

      <!-- Row 2 -->
      <button class="btn btn-num"         id="btn-7"       data-action="num" data-value="7">7</button>
      <button class="btn btn-num"         id="btn-8"       data-action="num" data-value="8">8</button>
      <button class="btn btn-num"         id="btn-9"       data-action="num" data-value="9">9</button>
      <button class="btn btn-op"          id="btn-mul"     data-action="op"  data-value="×">×</button>

      <!-- Row 3 -->
      <button class="btn btn-num"         id="btn-4"       data-action="num" data-value="4">4</button>
      <button class="btn btn-num"         id="btn-5"       data-action="num" data-value="5">5</button>
      <button class="btn btn-num"         id="btn-6"       data-action="num" data-value="6">6</button>
      <button class="btn btn-op"          id="btn-sub"     data-action="op"  data-value="−">−</button>

      <!-- Row 4 -->
      <button class="btn btn-num"         id="btn-1"       data-action="num" data-value="1">1</button>
      <button class="btn btn-num"         id="btn-2"       data-action="num" data-value="2">2</button>
      <button class="btn btn-num"         id="btn-3"       data-action="num" data-value="3">3</button>
      <button class="btn btn-op"          id="btn-add"     data-action="op"  data-value="+">+</button>

      <!-- Row 5 -->
      <button class="btn btn-num"         id="btn-sign"    data-action="sign">+/−</button>
      <button class="btn btn-num"         id="btn-0"       data-action="num" data-value="0">0</button>
      <button class="btn btn-num"         id="btn-dot"     data-action="dot">.</button>
      <button class="btn btn-eq"          id="btn-eq"      data-action="equals">=</button>

    </div>

    <!-- Keyboard hint -->
    <p class="keyboard-hint">⌨️ Keyboard supported</p>

  </div>

  <script src="script.js"></script>
</body>
</html>
